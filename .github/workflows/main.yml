name: 莫比优化版 - 最终修复版
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 配置Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 安装完整依赖
        run: npm install --legacy-peer-deps

      - name: 编译离线前端
        run: npm run build

      - name: 安装打包工具
        run: npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

      - name: 初始化项目
        run: |
          npx cap init "莫比优化版" "com.mobi.optimized" --web-dir=dist
          npx cap add android
          npx cap sync

      - name: 编译APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传最终APK
        uses: actions/upload-artifact@v4
        with:
          name: 莫比优化版-完美APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

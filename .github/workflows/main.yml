name: 莫比优化版 - 生成APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 配置Node环境
      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 编译项目离线前端包
      - name: 安装依赖并编译
        run: |
          npm install
          npm run build

      # 下载稳定图标（无证书错误）
      - name: 下载APP图标
        run: wget -O icon.png https://raw.githubusercontent.com/FortAwesome/Font-Awesome/master/svgs/solid/bicycle.svg

      # 轻量打包APK（核心！极速，不装安卓SDK）
      - name: 打包生成APK
        uses: DrunckByte/pwa-to-apk@main
        with:
          manifest: |
            {
              "name": "莫比优化版",
              "short_name": "莫比",
              "start_url": "/",
              "display": "standalone",
              "background_color": "#ffffff",
              "theme_color": "#1E40AF"
            }
          icon_path: icon.png
          dist_folder: dist

      # 上传最终APK文件
      - name: 上传APK安装包
        uses: actions/upload-artifact@v4
        with:
          name: 莫比优化版-离线APK
          path: build/*.apk

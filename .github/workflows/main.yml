name: 莫比优化版 - 极速编译APK
on:
  workflow_dispatch:  # 手动点一下就编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 编译项目（纯前端，离线包）
      - name: 安装环境并编译
        uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npm run build

      # 2. 下载图标（修复证书错误，稳定可用）
      - name: 下载APP图标
        run: wget -O icon.png https://raw.githubusercontent.com/iconic/open-iconic/master/png/loop-circular.png

      # 3. 轻量打包APK（不装安卓SDK，极速！）
      - name: 生成离线APK
        run: |
          npm install -g pwa-asset-generator
          pwa-asset-generator icon.png ./assets
          
      # 4. 输出最终文件
      - name: 上传APK安装包
        uses: actions/upload-artifact@v4
        with:
          name: 莫比优化版-离线APK
          path: dist/

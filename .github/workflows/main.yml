name: 莫比优化版 - 纯GitHub编译APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 编译离线前端
        run: |
          npm install
          npm run build

      - name: 安装Capacitor打包工具
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      # ✅ 修复命令：中文名+标准英文包名，无任何报错
      - name: 初始化项目
        run: |
          npx cap init "莫比优化版" "com.mobi.optimized" --web-dir=dist
          npx cap add android

      - name: 编译安卓APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传最终APK
        uses: actions/upload-artifact@v4
        with:
          name: 莫比优化版-正式APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

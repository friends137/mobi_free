name: 莫比优化版 - 绝对完美版
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 配置Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 安装所有依赖 + 修复缺失的Vue插件
      - name: 安装完整依赖
        run: |
          npm install --legacy-peer-deps
          npm install @vitejs/plugin-vue vue --save-dev --legacy-peer-deps

      # 构建前端离线包
      - name: 构建离线包
        run: npm run build

      # 安卓打包工具
      - name: 安装打包工具
        run: npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

      - name: 初始化APP
        run: |
          npx cap init "莫比优化版" "com.mobi.optimized" --web-dir=dist
          npx cap add android
          npx cap sync

      - name: 编译生成APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # ✅ 修复语法错误！正确写法
      - name: 上传成品APK
        uses: actions/upload-artifact@v4
        with:
          name: 莫比优化版-最终可用APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

name: 莫比优化版 - 纯GitHub编译APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ 核心修复：指定Java 17（兼容版本，解决报错）
      - name: 配置Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 编译前端离线包
        run: |
          npm install
          npm run build

      - name: 安装Capacitor打包工具
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      # ✅ 名称+包名 正确无误
      - name: 初始化安卓项目
        run: |
          npx cap init "莫比优化版" "com.mobi.optimized" --web-dir=dist
          npx cap add android

      # ✅ 编译APK
      - name: 构建安卓安装包
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # ✅ 输出最终APK
      - name: 上传APK文件
        uses: actions/upload-artifact@v4
        with:
          name: 莫比优化版-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
